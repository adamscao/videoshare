<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">视频分享平台 - VideoShare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 600px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 22px; color: #333; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .github-link {
            color: #333;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .github-link:hover { background: #f0f0f0; }
        .lang-btn {
            padding: 6px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn.active { background: #667eea; color: white; }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { color: #333; margin-bottom: 25px; text-align: center; }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
        input[type="file"] { display: none; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .file-input-label {
            display: block;
            padding: 10px 15px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
        }
        .file-input-label:hover { background: #e8f0fe; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .progress { display: none; margin-top: 20px; }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #d4edda;
            border-radius: 8px;
            color: #155724;
        }
        .file-info { margin-top: 8px; font-size: 13px; color: #666; }
        .hint { color: #999; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 视频分享平台</h1>
        <div class="header-actions">
            <a href="https://github.com/adamscao/videoshare" target="_blank" class="github-link">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
            <button class="lang-btn" onclick="switchLang('en')">English</button>
            <button class="lang-btn active" onclick="switchLang('zh')">中文</button>
        </div>
    </div>

    <div class="container">
        <h2>📤 上传视频</h2>
        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <p style="font-size: 48px;">📁</p>
                <p style="color: #667eea; font-size: 18px; margin: 10px 0;">点击或拖拽上传视频</p>
                <p style="color: #999; font-size: 14px;">支持 MP4, AVI, MKV, MOV 等格式</p>
                <input type="file" id="videoFile" accept="video/*" required>
            </div>
            <div class="file-info" id="fileInfo" style="display:none;"></div>

            <div class="form-group">
                <label>视频标题 (可选)</label>
                <input type="text" id="title" placeholder="留空则使用文件名">
            </div>

            <div class="form-group">
                <label>视频描述 (可选)</label>
                <textarea id="description" placeholder="描述这个视频..."></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group" onclick="document.getElementById('passwordProtected').click()">
                    <input type="checkbox" id="passwordProtected" onclick="event.stopPropagation(); togglePassword()">
                    <label>设置密码保护</label>
                </div>
            </div>

            <div class="form-group" id="passwordField" style="display:none;">
                <label>视频密码</label>
                <input type="password" id="videoPassword" placeholder="输入密码...">
            </div>

            <div class="form-group">
                <label>字幕文件 (可选)</label>
                <label for="subtitleFile" class="file-input-label">📄 选择字幕文件</label>
                <input type="file" id="subtitleFile" accept=".srt,.vtt,.txt">
                <div class="file-info" id="subtitleInfo"></div>
                <p class="hint">支持 SRT, VTT 格式</p>
            </div>

            <button type="submit" class="btn" id="uploadBtn">开始上传</button>
        </form>

        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
        </div>
        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('videoFile');
        const fileInfo = document.getElementById('fileInfo');
        const subtitleInput = document.getElementById('subtitleFile');
        const subtitleInfo = document.getElementById('subtitleInfo');

        function switchLang(lang) {
            // Simple language switch - can be expanded
            console.log('Switched to:', lang);
        }

        function togglePassword() {
            const field = document.getElementById('passwordField');
            const checked = document.getElementById('passwordProtected').checked;
            field.style.display = checked ? 'block' : 'none';
        }

        uploadArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if (e.target.files[0]) {
                const file = e.target.files[0];
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                fileInfo.textContent = `已选择: ${file.name} (${sizeMB} MB)`;
                fileInfo.style.display = 'block';
            }
        };

        subtitleInput.onchange = (e) => {
            if (e.target.files[0]) {
                subtitleInfo.textContent = `字幕: ${e.target.files[0].name}`;
                subtitleInfo.style.display = 'block';
            }
        };

        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.background = '#f0f4ff'; };
        uploadArea.ondragleave = () => { uploadArea.style.background = ''; };
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.style.background = '';
            if (e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                fileInput.onchange();
            }
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) { alert('请选择视频文件'); return; }

            const formData = new FormData();
            formData.append('video', file);
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('password_protected', document.getElementById('passwordProtected').checked);
            if (document.getElementById('passwordProtected').checked) {
                formData.append('password', document.getElementById('videoPassword').value);
            }
            if (subtitleInput.files[0]) {
                formData.append('subtitle', subtitleInput.files[0]);
            }

            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';

            const xhr = new XMLHttpRequest();
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressFill').style.width = pct + '%';
                    document.getElementById('progressFill').textContent = pct + '%';
                }
            };
            xhr.onload = () => {
                document.getElementById('uploadBtn').disabled = false;
                document.getElementById('progress').style.display = 'none';
                if (xhr.status === 200) {
                    const res = JSON.parse(xhr.responseText);
                    document.getElementById('result').innerHTML = `
                        <p>✅ 上传成功！</p>
                        <p style="margin-top:10px;">播放链接: <a href="${res.url}" target="_blank">${location.origin}${res.url}</a></p>
                    `;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('uploadForm').reset();
                    fileInfo.style.display = 'none';
                    subtitleInfo.style.display = 'none';
                } else {
                    alert('上传失败');
                }
            };
            xhr.open('POST', '/api/upload');
            xhr.send(formData);
        };
    </script>
</body>
</html>
